name: Scrape TLB Listings

on:
  schedule:
    # Run every day at 06:00 UTC (08:00 SAST)
    - cron: '0 6 * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  contents: write      # Needed to push the updated listings.json

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper/scraper.py

      - name: Commit updated listings
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/listings.json
          git diff --staged --quiet || git commit -m "chore: update TLB listings [skip ci]"
          git push
